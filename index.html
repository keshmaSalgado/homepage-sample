<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />

    <title>Kngu Flower Shop</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-[#f8f8f8]">
    <!-- Top black bar -->
    <div class="bg-[#2d2d2d] text-white text-center text-sm py-3 relative">
      All featured product 50% off Shop Now
      <span class="absolute right-5 top-3 cursor-pointer">✕</span>
    </div>

    <div id="navbar-container"></div>

    <div id="hero"></div>
    <div id="features"></div>
    <div id="products"></div>
    <div id="promo"></div>
    <div id="featured"></div>
    <div id="testimonial"></div>
    <div id="experts"></div>
    <div id="blog"></div>
    <div id="newsletter"></div>
    <div id="footer"></div>
    
    <!-- WORK IN PROGRESS MODAL -->
    <div
      id="wipModal"
      class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50"
    >
      <div
        class="bg-white rounded-3xl p-10 max-w-md mx-4 text-center relative animate-[fadeIn_.3s_ease]"
      >
        <!-- close button -->
        <button
          id="closeModal"
          class="absolute top-4 right-5 text-3xl text-gray-500 hover:text-black"
        >
          ×
        </button>

        <!-- icon -->
        <div class="text-6xl mb-5">🚧</div>

        <h2 class="text-3xl font-bold text-[#303030] mb-4">Work In Progress</h2>

        <p class="text-gray-600 leading-7">
          This section is currently under development. Please check back later.
        </p>

        <button
          id="closeBtn"
          class="mt-8 bg-[#ff5a4a] text-white px-8 py-3 rounded-full font-semibold hover:scale-105 transition"
        >
          Okay
        </button>
      </div>
    </div>

    <script src="myscript.js"></script>
  </body>
</html>
